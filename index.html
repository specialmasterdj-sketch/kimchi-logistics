<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KIMCHI MART · Logistics moved to Chat</title>
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}
.card{background:#fff;color:#1f2937;border-radius:18px;padding:30px 26px;max-width:460px;width:100%;box-shadow:0 14px 40px rgba(0,0,0,.35);text-align:center}
.icon{font-size:3.6em;line-height:1;margin-bottom:10px}
h1{font-size:1.35em;font-weight:800;color:#0D47A1;margin-bottom:8px;letter-spacing:-.02em}
.sub{font-size:.95em;color:#374151;line-height:1.5;margin-bottom:18px}
.steps{background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:14px 16px;text-align:left;margin-bottom:18px}
.steps b{color:#0c4a6e;display:block;font-size:.82em;font-weight:800;margin-bottom:6px}
.steps ol{padding-left:20px;font-size:.86em;color:#0f172a;line-height:1.6}
.cta{display:block;background:#0D47A1;color:#fff;padding:14px;border-radius:12px;font-weight:800;text-decoration:none;font-size:1em;transition:.15s}
.cta:hover{background:#1565C0;transform:translateY(-1px)}
.lang{display:flex;gap:6px;justify-content:center;margin-top:14px}
.lang button{background:#f3f4f6;border:0;border-radius:14px;padding:5px 12px;font-size:.78em;font-weight:700;cursor:pointer;color:#374151}
.lang button.on{background:#0D47A1;color:#fff}
.foot{font-size:.7em;color:#9ca3af;margin-top:18px;line-height:1.4}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🚚</div>
  <h1 id="ttl">Logistics moved to Chat</h1>
  <div class="sub" id="sub"></div>
  <div class="steps">
    <b id="stepsHd">Quick steps</b>
    <ol>
      <li id="s1"></li>
      <li id="s2"></li>
      <li id="s3"></li>
      <li id="s4"></li>
    </ol>
  </div>
  <a class="cta" id="cta" href="https://specialmasterdj-sketch.github.io/kfood-guide/chat.html#need_overstock">📨 Go to Need / Overstock room</a>
  <div class="lang">
    <button data-l="en" onclick="setLang('en')">EN</button>
    <button data-l="ko" onclick="setLang('ko')">KO</button>
    <button data-l="es" onclick="setLang('es')">ES</button>
  </div>
  <div class="foot" id="foot"></div>
</div>
<script>
const T = {
  en: {
    ttl:'Logistics moved to Chat',
    sub:'The standalone Inter-Store Supply form has been retired. Pickup/drop requests now live in the <b>Need and over stock</b> chat room — open it, tap the 🚚 LOGISTICS button on the header, fill the quick list, attach photos in the chat. Every Tuesday before 11 AM each branch shares overstock and needed items there.',
    stepsHd:'Quick steps',
    s1:'Open Chat → "Need and over stock" room',
    s2:'Tap 🚚 <b>LOGISTICS</b> on the room header',
    s3:'Choose <b>I need</b> or <b>Overstock</b>, list items, send',
    s4:'Attach photos with 📷 right in the chat',
    cta:'📨 Go to Need / Overstock room',
    foot:'If you still need the old form for an in-progress request, contact the manager.'
  },
  ko: {
    ttl:'물류는 채팅으로 이전됐어요',
    sub:'기존 Inter-Store Supply 폼은 종료됐습니다. 픽업/배달 요청은 이제 <b>재고 부족/과다</b> 채팅방에서 진행됩니다 — 방 헤더의 🚚 로지스틱스 버튼을 눌러 간단 리스트로 작성, 사진은 채팅에 바로 첨부. 매주 화요일 오전 11시 전까지 각 지점의 오버스탁/필요 품목을 여기서 공유합니다.',
    stepsHd:'사용법',
    s1:'채팅 → "재고 부족/과다" 방 열기',
    s2:'방 헤더의 🚚 <b>로지스틱스</b> 버튼 탭',
    s3:'<b>필요해요</b> 또는 <b>재고 있어요</b> 선택, 품목 입력 후 보내기',
    s4:'사진은 채팅의 📷 버튼으로 바로 첨부',
    cta:'📨 재고 부족/과다 방으로 이동',
    foot:'진행 중인 옛 요청 때문에 옛 폼이 필요하면 매니저에게 문의하세요.'
  },
  es: {
    ttl:'Logística ahora está en el Chat',
    sub:'El formulario Inter-Store Supply fue retirado. Las solicitudes de recogida/entrega ahora se manejan en la sala de chat <b>Need and over stock</b> — abre la sala, toca el botón 🚚 LOGISTICS en el encabezado, completa la lista rápida, adjunta fotos en el chat. Cada martes antes de las 11 AM cada sucursal comparte excesos y faltantes.',
    stepsHd:'Pasos rápidos',
    s1:'Abre Chat → sala "Need and over stock"',
    s2:'Toca 🚚 <b>LOGISTICS</b> en el encabezado',
    s3:'Elige <b>I need</b> o <b>Overstock</b>, lista los artículos, envía',
    s4:'Adjunta fotos con 📷 en el mismo chat',
    cta:'📨 Ir a la sala Need / Overstock',
    foot:'Si necesitas el formulario antiguo para una solicitud en curso, contacta al gerente.'
  }
};
function setLang(l){
  if (!T[l]) l = 'en';
  try { localStorage.setItem('kimchi_lang', l); } catch(e) {}
  document.documentElement.lang = l;
  const t = T[l];
  for (const k in t) { const el = document.getElementById(k); if (el) el.innerHTML = t[k]; }
  document.querySelectorAll('.lang button').forEach(b => b.classList.toggle('on', b.dataset.l === l));
}
let saved = 'en';
try { saved = localStorage.getItem('kimchi_lang') || 'en'; } catch(e) {}
if (!T[saved]) saved = 'en';
setLang(saved);
// Soft auto-redirect after 4s so people who already understand the move
// don't have to tap the CTA every time.
setTimeout(() => { location.href = 'https://specialmasterdj-sketch.github.io/kfood-guide/chat.html#need_overstock'; }, 4000);
</script>
</body>
</html>
